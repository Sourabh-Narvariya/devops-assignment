# NGINX acts as a reverse proxy — it sits in front of FastAPI
# and handles all incoming traffic

events {
    worker_connections 1024;
}

http {
    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Security Headers ───────────────────────────────────────────────────────
    # These headers protect against common web attacks
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ── Rate Limiting ──────────────────────────────────────────────────────────
    # Allow max 10 requests/second per IP — protects against abuse
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # ── Upstream — our FastAPI app ─────────────────────────────────────────────
    upstream fastapi {
        server app:8000;  # 'app' is the Docker Compose service name
    }

    # ── HTTP Server (port 80) ──────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;  # Accept any hostname

        # Apply rate limiting
        limit_req zone=api burst=20 nodelay;

        # Health check endpoint (bypasses rate limiting)
        location /health {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            access_log off;  # Don't log health checks (too noisy)
        }

        # All other routes → FastAPI
        location / {
            proxy_pass http://fastapi;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }

    # ── HTTPS Server (port 443) ────────────────────────────────────────────────
    # Uncomment this block when you have a real domain + SSL cert
    # (Use Certbot/Let's Encrypt to generate the cert files)
    #
    # server {
    #     listen 443 ssl;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     location / {
    #         proxy_pass http://fastapi;
    #         proxy_set_header Host              $host;
    #         proxy_set_header X-Real-IP         $remote_addr;
    #         proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #     }
    # }
}
