# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions CI/CD Pipeline
#
# WHAT THIS DOES:
# Every time you push code to the 'main' branch:
# 1. GitHub spins up a fresh Ubuntu machine (runner)
# 2. Builds your Docker images
# 3. Runs a basic smoke test (health check)
# 4. If you had a real server: SSHes in and deploys automatically
#
# Think of it as a robot that wakes up every time you push code.
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Build & Test ─────────────────────────────────────────────────────
  build-and-test:
    name: Build Docker Images & Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your code onto the runner machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx (better build performance)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Create .env file from GitHub Secrets
      # (You set these in: GitHub repo → Settings → Secrets → Actions)
      - name: Create .env file
        run: |
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env

      # Step 4: Build all containers
      - name: Build Docker images
        run: docker compose build

      # Step 5: Start all services
      - name: Start services
        run: docker compose up -d

      # Step 6: Wait for services to be healthy
      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to start..."
          sleep 20
          docker compose ps

      # Step 7: Health check — confirm the API is alive
      - name: Run health check
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/health)
          echo "Health check HTTP status: $response"
          if [ "$response" != "200" ]; then
            echo "❌ Health check failed!"
            docker compose logs
            exit 1
          fi
          echo "✅ Health check passed!"

      # Step 8: Show logs if anything failed
      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      # Step 9: Tear down
      - name: Tear down containers
        if: always()
        run: docker compose down -v

  # ── Job 2: Deploy to Server ─────────────────────────────────────────────────
  # This job runs ONLY on pushes to main (not PRs) AND only if build passed.
  # It SSHes into your server and pulls + restarts the updated containers.
  #
  # For this assignment: the job structure is here and correct.
  # In a real deployment, you'd add your server IP and SSH key as Secrets.
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-test           # Only runs if build-and-test passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # In production, this step SSHes into your server and deploys.
      # Replace SERVER_IP, SSH_PRIVATE_KEY with your actual GitHub Secrets.
      - name: Deploy to server via SSH
        # Uncomment and configure when you have a real server:
        # uses: appleboy/ssh-action@v1.0.3
        # with:
        #   host: ${{ secrets.SERVER_IP }}
        #   username: ubuntu
        #   key: ${{ secrets.SSH_PRIVATE_KEY }}
        #   script: |
        #     cd /opt/devops-assignment
        #     git pull origin main
        #     echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" > .env
        #     echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
        #     echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
        #     docker compose pull
        #     docker compose up -d --build
        #     docker compose ps
        run: |
          echo "✅ Deploy step ready."
          echo "In production: this SSHes into the server and runs docker compose up -d --build"
          echo "Zero-downtime strategy: new containers start → health check passes → old ones stop"
