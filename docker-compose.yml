version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Docker Compose wires all 4 services together so they can talk to each other.
# Think of it as: "start these boxes and connect them on a private network"
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. PostgreSQL Database ──────────────────────────────────────────────────
  # Stores your data permanently. Even if container restarts, data stays safe
  # because it's saved in a "volume" (a folder on the host machine).
  postgres:
    image: postgres:15-alpine          # Official Postgres image (alpine = smaller)
    container_name: devops_postgres
    restart: unless-stopped            # Auto-restart if it crashes
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data   # Data persists here
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Redis Cache ──────────────────────────────────────────────────────────
  # Super-fast in-memory store. Used for caching, session storage, counters.
  redis:
    image: redis:7-alpine
    container_name: devops_redis
    restart: unless-stopped
    command: redis-server --appendonly yes   # Persist data to disk
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 3. FastAPI Application ──────────────────────────────────────────────────
  # Your actual Python API. Depends on postgres and redis being healthy first.
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: devops_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy    # Wait for postgres to be ready
      redis:
        condition: service_healthy    # Wait for redis to be ready
    networks:
      - app_network
    # Note: port 8000 is NOT exposed to the internet directly.
    # Only NGINX (below) is the public entry point. This is a security best practice.

  # ── 4. NGINX Reverse Proxy ──────────────────────────────────────────────────
  # The public "front door". Only this service exposes ports to the internet.
  # Routes all traffic → FastAPI app internally.
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: devops_nginx
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP
      - "443:443"    # HTTPS (when SSL is configured)
    depends_on:
      - app
    networks:
      - app_network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro   # ro = read-only (security)

# ── Volumes ────────────────────────────────────────────────────────────────────
# Named volumes = data stored on the host machine, survives container restarts
volumes:
  postgres_data:
  redis_data:

# ── Network ────────────────────────────────────────────────────────────────────
# All containers talk to each other on this private network.
# From outside, only port 80/443 (NGINX) is accessible.
networks:
  app_network:
    driver: bridge
